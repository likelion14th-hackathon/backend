name: Backend CI

# main 또는 dev 브랜치에 코드가 반영되거나 PR이 열리면 CI를 실행합니다.
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

# 같은 브랜치에 새 커밋이 올라오면 이전 실행을 취소해 불필요한 실행을 줄입니다.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 코드 조회에 필요한 최소 권한만 허용합니다.
permissions:
  contents: read

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # 애플리케이션 컨텍스트 테스트에서 사용할 임시 MySQL입니다.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: todays_casting
          MYSQL_USER: todays
          MYSQL_PASSWORD: todays1234
          MYSQL_ROOT_PASSWORD: root1234
          TZ: Asia/Seoul
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot1234"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    # Spring Boot가 위의 MySQL 서비스에 연결할 때 사용하는 테스트 환경변수입니다.
    env:
      SPRING_PROFILES_ACTIVE: local
      LOCAL_DB_URL: "jdbc:mysql://127.0.0.1:3306/todays_casting?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true"
      LOCAL_DB_USERNAME: todays
      LOCAL_DB_PASSWORD: todays1234
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul

    steps:
      # PR 또는 브랜치의 소스 코드를 러너로 내려받습니다.
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # 이후 단계는 Git push가 필요 없으므로 GITHUB_TOKEN을 Git 설정에 남기지 않습니다.
          persist-credentials: false

      # 프로젝트 기준 버전인 Temurin Java 21을 설치합니다.
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      # Gradle 캐시와 Wrapper 검증을 설정합니다.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Windows에서 추가된 gradlew 파일을 Linux에서도 실행할 수 있게 합니다.
      - name: Grant execute permission for Gradle Wrapper
        run: chmod +x gradlew

      # 컴파일, Flyway 적용, 전체 테스트와 실행 가능한 JAR 생성을 검증합니다.
      - name: Build and test
        run: ./gradlew clean build --no-daemon

      # AWS 배포 전에 Dockerfile로 애플리케이션 이미지가 정상 생성되는지 검증합니다.
      # CI에서는 외부 Registry로 이미지를 push하지 않으므로 별도 비밀키가 필요하지 않습니다.
      - name: Build Docker image
        run: docker build --tag todays-casting-backend:${{ github.sha }} .
