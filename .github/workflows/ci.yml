name: CI

on:
  # dev 브랜치에 push되면 CI를 실행합니다.
  push:
    branches:
      - dev
  # dev 또는 main 브랜치로 PR이 열리면 CI를 실행합니다.
  pull_request:
    branches:
      - dev
      - main
  # 수동 실행 허용
  workflow_dispatch:

concurrency:
  # 같은 브랜치의 이전 실행은 취소하고 최신 커밋만 검증합니다.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # 저장소 소스 조회에 필요한 최소 권한만 사용합니다.
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # GitHub Actions 테스트에서만 사용하는 MySQL 서비스입니다.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: todays_casting
          MYSQL_USER: todays
          MYSQL_PASSWORD: todays1234
          MYSQL_ROOT_PASSWORD: root1234
          TZ: Asia/Seoul
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot1234"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    # Spring Boot 테스트 datasource는 GitHub Actions의 MySQL 서비스를 바라봅니다.
    env:
      SPRING_PROFILES_ACTIVE: local
      LOCAL_DB_URL: "jdbc:mysql://127.0.0.1:3306/todays_casting?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true"
      LOCAL_DB_USERNAME: todays
      LOCAL_DB_PASSWORD: todays1234
      AWS_S3_BUCKET_NAME: ci-test-bucket
      AWS_S3_REGION: ap-northeast-2
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul

    steps:
      - name: Checkout code
        # 저장소 코드를 러너에 체크아웃합니다.
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 21
        # 프로젝트 기준 버전인 Temurin Java 21을 설치합니다.
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Cache Gradle packages
        # Gradle 의존성과 Wrapper 캐시를 재사용해 CI 시간을 줄입니다.
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        # Windows에서 추가된 gradlew 파일을 Linux 러너에서도 실행할 수 있게 합니다.
        run: chmod +x ./gradlew

      - name: Build with Gradle
        # 컴파일, 테스트, 실행 가능한 JAR 생성, Flyway/JPA 시작 검증을 모두 수행합니다.
        run: ./gradlew clean build --no-daemon

      - name: Upload build artifacts
        # 빌드 결과 JAR를 Actions artifact로 보관합니다.
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/libs/

      - name: Build Docker image
        # CI에서는 DockerHub에 push하지 않고 이미지가 정상 빌드되는지만 검증합니다.
        run: docker build --tag todays-casting-backend:${{ github.sha }} .
