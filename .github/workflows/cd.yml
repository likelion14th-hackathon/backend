name: CD
# 목적: main 브랜치 변경 시 DockerHub 이미지를 갱신하고 EC2에 연결해 Docker Compose로 재기동
# - dev → main 머지 후 main 기준으로만 배포하여 배포 기준 일관성 유지

on:
  # main 브랜치 푸시 시 자동 실행
  push:
    branches:
      - main
  # 수동 실행 허용
  workflow_dispatch:

concurrency:
  # main 배포는 한 번에 하나만 실행되도록 제한합니다.
  group: cd-${{ github.workflow }}-main
  cancel-in-progress: true

permissions:
  # Docker 이미지 빌드와 배포 스크립트에 필요한 소스 조회 권한만 사용합니다.
  contents: read

jobs:
  docker:
    name: Docker 이미지 빌드 및 푸시
    # GitHub Actions 호스트 러너(빌드 전용). 실제 배포는 SSH로 EC2에서 진행
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        # 저장소 코드를 러너에 체크아웃(Docker 이미지 빌드에 필요)
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Docker Buildx 설정
        # Docker 멀티 플랫폼 빌드 도구를 준비합니다.
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub 로그인
        # DockerHub에 이미지를 push하기 위해 GitHub Secrets의 토큰으로 로그인합니다.
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 푸시
        # latest 태그와 커밋 SHA 태그를 함께 push하여 롤백 기준을 남깁니다.
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todays-casting-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/todays-casting-backend:${{ github.sha }}

  deploy:
    name: EC2 배포
    # GitHub Actions 호스트 러너(SSH 실행 전용). 배포 명령은 EC2에서 수행
    runs-on: ubuntu-latest
    needs: docker
    timeout-minutes: 10

    steps:
      - name: Deploy to EC2
        # SSH로 EC2(프로덕션) 접속 후 배포 스크립트 실행
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # set -e: 실패 시 즉시 중단 → 불완전 배포 방지
            set -e

            # 프로젝트 디렉토리 준비 및 이동 (실제 저장소 경로)
            mkdir -p "${{ secrets.EC2_DEPLOY_PATH }}"
            cd "${{ secrets.EC2_DEPLOY_PATH }}"

            # Git 저장소 준비: 없으면 clone, 있으면 최신 main으로 동기화
            # 기존 배포 디렉토리 재활용 → 불필요한 클론/빌드 최소화
            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }}.git .
            fi
            git fetch --all --prune
            git checkout main || git checkout -b main origin/main
            git reset --hard origin/main

            # .env 파일 생성 (GitHub Secrets 사용)
            # 애플리케이션 환경 변수
            # 민감 정보는 GitHub Secrets에서 주입, 파일은 서버 로컬에만 존재
            cat > .env << 'EOF'
            SERVER_PORT=8080
            SPRING_PROFILES_ACTIVE=local
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            LOCAL_DB_URL=${{ secrets.LOCAL_DB_URL }}
            LOCAL_DB_USERNAME=${{ secrets.LOCAL_DB_USERNAME }}
            LOCAL_DB_PASSWORD=${{ secrets.LOCAL_DB_PASSWORD }}
            AWS_S3_BUCKET_NAME=${{ secrets.AWS_S3_BUCKET_NAME }}
            AWS_S3_REGION=${{ secrets.AWS_S3_REGION }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_ACCESS_TOKEN_VALIDITY=${{ secrets.JWT_ACCESS_TOKEN_VALIDITY }}
            EOF

            # Docker Compose v2/v1 자동 감지
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
              WAIT_FLAG="--wait"  # v2만 지원
            else
              DC="docker-compose"
              WAIT_FLAG=""
            fi

            # 프로젝트명 고정 → 네트워크/컨테이너 명명 일관성
            export COMPOSE_PROJECT_NAME=todays-casting

            # 1) down: 이전 리소스 정리(다운타임 허용) 후 재기동
            $DC down --remove-orphans || true

            # 2) 남아있는 컨테이너 강제 제거 (이름 충돌 방지)
            # docker-compose down 후에도 남아있을 수 있는 컨테이너 정리
            docker rm -f todays-casting-app >/dev/null 2>&1 || true

            # 3) pull: 최신 이미지 당김(롤아웃 전 준비)
            $DC pull

            # 4) up: 강제 재생성, v2면 헬스체크 healthy까지 대기
            $DC up -d --force-recreate --remove-orphans $WAIT_FLAG

            # 배포 상태 확인
            # 컨테이너 목록 출력 → 최종 점검
            sleep 10
            $DC ps

            # 불필요한 Docker 리소스 정리 (용량 절약)
            # 사용하지 않는 이미지, 컨테이너, 네트워크 삭제
            # --volumes=false: 볼륨은 보존 (데이터 손실 방지)
            docker system prune -a -f --volumes=false || true
