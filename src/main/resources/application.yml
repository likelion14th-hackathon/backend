spring:
  application:
    name: todays-casting-backend

  # MySQL 데이터베이스 설정입니다. 실행 환경에서 LOCAL_DB_* 값을 주입합니다.
  datasource:
    url: ${LOCAL_DB_URL}
    username: ${LOCAL_DB_USERNAME}
    password: ${LOCAL_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA/Hibernate 설정입니다. 스키마 변경은 Flyway가 관리하고 Hibernate는 검증만 합니다.
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 1000
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: false

  # Flyway 마이그레이션 파일 위치는 src/main/resources/db/migration 입니다.
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

# 서버 설정
server:
  port: ${SERVER_PORT:8080}

# 로그 설정
logging:
  level:
    org.hibernate.SQL: debug

# Swagger 설정
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# AWS S3 설정
aws:
  s3:
    bucket: ${AWS_S3_BUCKET_NAME:todays-casting-prod-2026}
    region: ${AWS_S3_REGION:ap-northeast-2}
