spring:
  application:
    name: todays-casting-backend

  # MySQL database
  datasource:
    url: ${LOCAL_DB_URL:${PROD_DB_URL}}
    username: ${LOCAL_DB_USERNAME:${PROD_DB_USERNAME}}
    password: ${LOCAL_DB_PASSWORD:${PROD_DB_PASSWORD}}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 1000
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: false

  # Flyway migration
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

# Server
server:
  port: ${SERVER_PORT:8080}

# Logging
logging:
  level:
    org.hibernate.SQL: debug

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
