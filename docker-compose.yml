services:
  # 배포용 Spring Boot 애플리케이션 컨테이너입니다.
  # DB는 컨테이너로 띄우지 않고 LOCAL_DB_* 환경변수로 외부 DB를 주입합니다.
  app:
    image: ${DOCKERHUB_USERNAME}/todays-casting-backend:latest
    container_name: todays-casting-app
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      # DB 접속 정보입니다. 배포 서버에서는 LOCAL_DB_*에 RDS 접속 정보를 넣습니다.
      LOCAL_DB_URL: ${LOCAL_DB_URL}
      LOCAL_DB_USERNAME: ${LOCAL_DB_USERNAME}
      LOCAL_DB_PASSWORD: ${LOCAL_DB_PASSWORD}
      
      # S3 파일 저장소 접속 설정입니다. 실제 권한은 EC2 IAM Role 또는 로컬 AWS credential을 사용합니다.
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      AWS_S3_REGION: ${AWS_S3_REGION}

      # Gemini API 접속 설정입니다.
      GEMINI_API_KEY: ${GEMINI_API_KEY}

      # 애플리케이션 실행 환경 설정입니다.
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_PORT: ${SERVER_PORT}
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
